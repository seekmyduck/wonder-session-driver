name: Build & Notarize Wonder Session Driver

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_CERT }}
          p12-password: ${{ secrets.CERT_PASSWORD }}
          keychain: signing
          keychain-password: temp123

      - name: Setup notarytool
        run: |
          xcrun notarytool store-credentials notarytool-wondervo \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "2A28Q8V23R" \
            --password "${{ secrets.APP_SPECIFIC_PASSWORD }}"

      - name: Build drivers
        run: |
          security unlock-keychain -p "temp123" signing.keychain-db
          make all

      - name: Copy icon
        run: |
          for d in WS-DAW-to-Talent WS-DAW-to-Conf WS-Conf-to-DAW WS-Talent-to-DAW; do
            mkdir -p $d.driver/Contents/Resources
            cp WonderSession.icns $d.driver/Contents/Resources/
          done

      - name: Sign drivers
        run: |
          for d in WS-DAW-to-Talent WS-DAW-to-Conf WS-Conf-to-DAW WS-Talent-to-DAW; do
            codesign --sign "Developer ID Application: David Tarabbia (2A28Q8V23R)" \
              --options runtime --timestamp --force --deep \
              $d.driver
            echo "✅ Signed: $d"
          done

      - name: Build pkg
        run: |
          mkdir -p pkg_root/Library/Audio/Plug-Ins/HAL
          for d in WS-DAW-to-Talent WS-DAW-to-Conf WS-Conf-to-DAW WS-Talent-to-DAW; do
            cp -r $d.driver pkg_root/Library/Audio/Plug-Ins/HAL/
          done

          pkgbuild \
            --root pkg_root \
            --identifier com.wonderstudio.driver \
            --version 1.0.0 \
            --install-location / \
            --scripts Installer/scripts \
            WonderSession-component.pkg

          productbuild \
            --distribution Installer/Distribution.xml \
            --resources Installer/Resources \
            --package-path . \
            --sign "Developer ID Installer: David Tarabbia (2A28Q8V23R)" \
            WonderSessionDriver.pkg

      - name: Notarize
        run: |
          xcrun notarytool submit WonderSessionDriver.pkg \
            --keychain-profile notarytool-wondervo \
            --wait

          xcrun stapler staple WonderSessionDriver.pkg
          echo "✅ Notarized & stapled"

      - name: Upload pkg
        uses: actions/upload-artifact@v4
        with:
          name: WonderSessionDriver
          path: WonderSessionDriver.pkg
          retention-days: 30
